name: pip-audit
on:
  pull_request:
    paths:
      - "requirements*.txt"
      - "pyproject.toml"
      - "poetry.lock"

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with: { python-version: "3.12" }
      - run: python -m pip install --upgrade pip pip-audit
      - run: pip-audit -r requirements.txt --ignore-vuln GHSA-wj6h-64fc-37mp || (echo "pip-audit found issues"; exit 1)
        if: hashFiles('requirements.txt') != ''
